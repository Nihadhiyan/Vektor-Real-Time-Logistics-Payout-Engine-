spring:
  application:
    name: dispatch-engine

  datasource:
    url: jdbc:postgresql://localhost:5433/vektor
    username: vektor
    password: vektor
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: dispatch-processor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.vektor.dispatch_engine.*"
        spring.json.value.default.type: com.vektor.dispatch_engine.DeliveryUpdate
        spring.json.use.type.headers: false
