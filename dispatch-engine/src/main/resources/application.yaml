spring:
  application:
    name: dispatch-engine

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5433/vektor
    username: vektor
    password: vektor
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  flyway:
    enabled: true
    out-of-order: false
    baseline-on-migrate: true # Tells Flyway it's okay to start fresh
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: dispatch-processor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        # Delegate the actual parsing back to the JsonDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.vektor.dispatch_engine.*"
        spring.json.value.default.type: com.vektor.dispatch_engine.dto.deliveryevent.request.DeliveryEventUpdateRequest
        spring.json.use.type.headers: false
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
          - metrics
  metrics:
    tags:
      application: dispatch-engine
      

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      bankGateway:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

vektor:
  bank:
    base-url: https://api.example-bank.com
  payout:
    schedule-ms: 60000
    partition-count: 4
  outbox:
    stuck-threshold-minutes: 5
    sweep-ms: 60000

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG