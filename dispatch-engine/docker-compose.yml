services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # Open two ports: 9092 (External/Windows) and 29092 (Internal/Docker)
      - KAFKA_LISTENERS=EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:16
    container_name: vektor-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=vektor
      - POSTGRES_PASSWORD=vektor
      - POSTGRES_DB=vektor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vektor -d vektor"]
      interval: 5s
      timeout: 5s
      retries: 5

  dispatch-engine: 
    build: .
    container_name: vektor-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/vektor
      - SPRING_DATASOURCE_USERNAME=vektor
      - SPRING_DATASOURCE_PASSWORD=vektor
      - SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS=kafka:29092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
      

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: vektor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      dispatch-engine:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.1.0
    container_name: vektor-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      